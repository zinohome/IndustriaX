name: industriax

networks:
  1panel-network:
    external: true

services:
  postgres:
    image: apache/age:release_PG16_1.6.0
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - /data/industriax/postgres:/var/lib/postgresql/data
      - ./init/age.sql:/docker-entrypoint-initdb.d/age.sql:ro
    networks:
      - 1panel-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10

  temporal:
    image: temporalio/auto-setup:1.24
    environment:
      DB: postgres12
      POSTGRES_SEEDS: postgres
      POSTGRES_PWD: ${POSTGRES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - 1panel-network
    healthcheck:
      test: ["CMD", "tctl", "--address", "temporal:7233", "cluster", "health"]
      interval: 15s
      timeout: 10s
      retries: 10

  ollama:
    image: ollama/ollama:0.5.7
    volumes:
      - /data/industriax/ollama:/root/.ollama
    networks:
      - 1panel-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  doc-mcp:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.mcp
    command: ["python", "-m", "industriax.mcp.doc_server"]
    networks:
      - 1panel-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import industriax.mcp.doc_server as m; assert m.health()['status']=='ok'\""]
      interval: 15s
      timeout: 10s
      retries: 5

  graph-mcp:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.mcp
    command: ["python", "-m", "industriax.mcp.graph_server"]
    networks:
      - 1panel-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import industriax.mcp.graph_server as m; assert m.health()['status']=='ok'\""]
      interval: 15s
      timeout: 10s
      retries: 5

  memory-mcp:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.mcp
    command: ["python", "-m", "industriax.mcp.memory_server"]
    networks:
      - 1panel-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import industriax.mcp.memory_server as m; assert m.health()['status']=='ok'\""]
      interval: 15s
      timeout: 10s
      retries: 5

  skill-tools-mcp:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.mcp
    command: ["python", "-m", "industriax.mcp.skill_tools_server"]
    networks:
      - 1panel-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import industriax.mcp.skill_tools_server as m; assert m.health()['status']=='ok'\""]
      interval: 15s
      timeout: 10s
      retries: 5

  # --- RAGFlow Stack (option A: Infinity doc engine, Apache-2.0) ---

  infinity:
    image: infiniflow/infinity:v0.7.0
    volumes:
      - /data/industriax/infinity:/var/infinity
    networks:
      - 1panel-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:23820/admin/node/current || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  mysql:
    image: mysql:8.0.39
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD required}
    volumes:
      - /data/industriax/mysql:/var/lib/mysql
    networks:
      - 1panel-network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:?MINIO_USER required}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:?MINIO_PASSWORD required}
    volumes:
      - /data/industriax/minio:/data
    networks:
      - 1panel-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  valkey:
    image: valkey/valkey:8
    command: ["valkey-server", "--requirepass", "${VALKEY_PASSWORD:?VALKEY_PASSWORD required}"]
    environment:
      VALKEY_PASSWORD: ${VALKEY_PASSWORD:?VALKEY_PASSWORD required}
    volumes:
      - /data/industriax/valkey:/data
    networks:
      - 1panel-network
    healthcheck:
      test: ["CMD-SHELL", "valkey-cli -a \"$$VALKEY_PASSWORD\" ping || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  ragflow:
    image: infiniflow/ragflow:v0.20.5-slim
    environment:
      DOC_ENGINE: infinity
    depends_on:
      infinity:
        condition: service_healthy
      mysql:
        condition: service_healthy
      minio:
        condition: service_healthy
      valkey:
        condition: service_healthy
    volumes:
      - /data/industriax/ragflow:/ragflow/data
    networks:
      - 1panel-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9380/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10

  # Dev 环境说明：LLM/Embedding 走外部 192.168.66.163 的 Ollama，Reranker(TEI) 建议部署到
  # 192.168.66.163(12G GPU) 用 GPU 镜像；compose 内默认 CPU 镜像作私有化部署基线。
  tei:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.7
    command: ["--model-id", "BAAI/bge-reranker-v2-m3"]
    volumes:
      - /data/industriax/tei:/data
    networks:
      - 1panel-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
